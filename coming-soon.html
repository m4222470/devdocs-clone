<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="قريباً - Devdocs X">
    <meta name="robots" content="noindex">
    <title>قريباً - Devdocs X</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="coming-soon-page">
        <div class="coming-soon-content">
            <div class="logo-center">
                <svg width="64" height="64" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#6366F1"/>
                    <path d="M8 12H24M8 16H18M8 20H22M8 24H14" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Devdocs X</span>
            </div>
            
            <div class="countdown">
                <div class="countdown-item">
                    <span class="countdown-number">00</span>
                    <span class="countdown-label">يوم</span>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-item">
                    <span class="countdown-number">00</span>
                    <span class="countdown-label">ساعة</span>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-item">
                    <span class="countdown-number">00</span>
                    <span class="countdown-label">دقيقة</span>
                </div>
                <div class="countdown-separator">:</div>
                <div class="countdown-item">
                    <span class="countdown-number">00</span>
                    <span class="countdown-label">ثانية</span>
                </div>
            </div>
            
            <h1>قريباً</h1>
            <p>نعمل على شيء مميز! تابعنا ليصلك الإشعار عند الإطلاق.</p>
            
            <form class="notify-form">
                <input type="email" placeholder="بريدك الإلكتروني" class="notify-input">
                <button type="submit" class="btn btn-primary">أعلمني عند الإطلاق</button>
            </form>
            
            <div class="social-links-coming">
                <a href="#" class="social-link">تويتر</a>
                <a href="#" class="social-link">لينكدإن</a>
                <a href="#" class="social-link">جيثب</a>
            </div>
            
            <a href="index.html" class="back-home">← العودة للرئيسية</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
